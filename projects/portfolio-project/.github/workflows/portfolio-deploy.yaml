
name : portfolio-deploy

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write 

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

      # strategy:
      #   fail-fast: false
      #   matrix:
      #     node-version: [18.1, 18.2, 18.3]

    steps: 
    #get access to your portfolio code via predefined/pre-built  action
      - name: checkout code
        uses: actions/checkout@v4
    #setup  github pages via predefined/pre-built  action
      - name: setup github pages
        uses: actions/configure-pages@v4
    #static code artifacts
      - name : upload static files
        uses : actions/upload-pages-artifact@v4
        with:
          path: '.'
    #deploy to github pages via predefined/pre-built  action
      - name: deploy to github pages
        uses: actions/deploy-pages@v4 
